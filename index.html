<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viña Tuelda - Selección Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .modal-overlay { background: rgba(28, 25, 23, 0.4); backdrop-filter: blur(4px); }
        .wine-card:active { transform: scale(0.97); }
    </style>
</head>
<body class="bg-[#FDFCFB] text-stone-800 antialiased pb-12">

    <!-- Header Boutique -->
    <header class="pt-16 pb-12 px-6 text-center">
        <h1 class="text-3xl font-serif tracking-[0.5em] uppercase text-stone-900 mb-2">Viña Tuelda</h1>
        <div class="flex items-center justify-center gap-1.5 text-stone-400 text-[10px] font-bold uppercase tracking-widest">
            <i data-lucide="map-pin" class="w-3 h-3"></i>
            <span>Villatuelda • Ribera del Duero</span>
        </div>
    </header>

    <!-- Lista de Vinos -->
    <main id="wine-list" class="max-w-md mx-auto px-6 space-y-4">
        <!-- Los vinos se inyectan aquí con JS -->
    </main>

    <!-- Sección de Catálogo PDF -->
    <div class="max-w-md mx-auto px-6 mt-12">
        <div class="p-8 bg-stone-100 rounded-[2rem] text-center border border-stone-200/50">
            <i data-lucide="file-text" class="mx-auto text-stone-300 mb-4 w-8 h-8"></i>
            <h4 class="text-sm font-serif text-stone-800 mb-2 uppercase tracking-widest">Ficha Técnica Completa</h4>
            <p class="text-xs text-stone-500 leading-relaxed mb-6">
                Consulta detalles sobre tipos de suelo, procesos de fermentación y analíticas profesionales.
            </p>
            <button 
                onclick="openPDF()"
                class="inline-flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.2em] text-stone-900 border-b-2 border-stone-900 pb-1 hover:text-amber-700 hover:border-amber-700 transition-all"
            >
                Abrir Documento Técnico <i data-lucide="external-link" class="w-3 h-3"></i>
            </button>
        </div>

        <div class="pt-8 text-center">
            <button 
                onclick="handleWhatsApp()"
                class="inline-flex items-center gap-2 text-stone-400 hover:text-stone-900 transition-colors group"
            >
                <i data-lucide="message-square" class="w-4 h-4 group-hover:text-amber-600"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest">Consulta Directa Sommelier</span>
            </button>
        </div>
    </div>

    <!-- Modal de Detalle (Oculto por defecto) -->
    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6 animate-in fade-in duration-300">
        <div class="absolute inset-0 modal-overlay" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div id="modal-content" class="p-8">
                <!-- El contenido del modal se inyecta aquí -->
            </div>
        </div>
    </div>

    <script>
        const phoneNumber = "525550680087"; 
        const pdfUrl = "https://drive.google.com/file/d/1giTlN19W4O2F0uU10DgqXUDlWNLCEBed/view?usp=sharing"; 

        const wines = [
            {
                id: 'vendimia',
                name: 'Viña Tuelda Vendimia',
                label: 'Joven / Fresco',
                capsule: '#4B2C5E',
                tag: 'Para el diario',
                awards: 'Vino de Altura',
                pairing: 'Tapas, quesos y asados.',
                highlights: 'Fruta pura y frescura vibrante.',
                details: 'Viñedos de 20-25 años a 900m. 3 meses en barrica.'
            },
            {
                id: 'roble',
                name: 'Viña Tuelda Roble',
                label: 'El Favorito',
                capsule: '#2D4F8C',
                tag: '91 Pts Tim Atkin',
                awards: 'Mejor Calidad-Precio',
                pairing: 'Paté, semicurados y carnes.',
                highlights: 'Mineralidad caliza y final fresco.',
                details: '6 meses en barrica. Elegido el mejor tinto de Ribera bajo 16€.'
            },
            {
                id: 'crianza',
                name: 'Viña Tuelda Crianza',
                label: 'Clásico Elegante',
                capsule: '#B22222',
                tag: '90 Pts Atkin',
                awards: 'Medalla de Oro Mundial',
                pairing: 'Cortes braseados y aves.',
                highlights: 'Vainilla, cacao y frutos negros.',
                details: '15 meses en barrica. Estructura y taninos sedosos.'
            },
            {
                id: 'vegamian',
                name: 'Vegamian Crianza',
                label: 'Vino de Autor',
                capsule: '#1A1A1A',
                tag: 'Top 30 Ribera',
                awards: 'Armonía & Elegancia',
                pairing: 'Carnes rojas y salsas complejas.',
                highlights: 'Exuberancia frutal y especiados.',
                details: 'Selección de viñedos de 25-35 años. Gran persistencia.'
            },
            {
                id: 'reserva',
                name: 'Finca La Corva',
                label: 'Reserva Especial',
                capsule: '#A0A0A0',
                tag: 'Viñedo Único',
                awards: '91 Pts Tim Atkin',
                pairing: 'Trufa, caza y chocolate.',
                highlights: 'Intenso, ahumado y complejo.',
                details: '24 meses en barrica de una parcela de +35 años.'
            },
            {
                id: 'casiano',
                name: 'Casiano Gran Reserva',
                label: 'Icono de Lujo',
                capsule: '#800000',
                tag: 'Edición Limitada',
                awards: 'Solo 2,400 Botellas',
                pairing: 'Asados o para degustar solo.',
                highlights: 'Sedoso, terciario y persistente.',
                details: '58 meses de envejecimiento. La máxima expresión de Villatuelda.'
            }
        ];

        function renderWines() {
            const list = document.getElementById('wine-list');
            list.innerHTML = wines.map(wine => `
                <div onclick="openModal('${wine.id}')" class="wine-card group bg-white border border-stone-100 rounded-2xl p-5 flex items-center gap-5 transition-all shadow-sm cursor-pointer hover:shadow-md">
                    <div class="w-14 h-28 bg-stone-50 rounded-xl flex flex-col items-center justify-start py-3 shrink-0 border border-stone-100 shadow-inner overflow-hidden">
                        <div style="background-color: ${wine.capsule}" class="w-5 h-8 rounded-t-sm mb-1.5 shadow-sm"></div>
                        <div class="w-9 h-12 bg-white border border-stone-100 shadow-sm flex items-center justify-center">
                            <div class="text-[5px] font-serif opacity-30 leading-tight text-center uppercase font-bold tracking-tighter">Viña<br/>Tuelda</div>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <span class="text-[9px] font-black uppercase tracking-widest text-amber-700 mb-1 block">${wine.label}</span>
                        <h3 class="text-xl font-serif text-stone-900 truncate leading-tight mb-2">${wine.name}</h3>
                        <div class="flex items-center gap-1 px-2 py-0.5 bg-stone-50 rounded text-[10px] text-stone-500 border border-stone-100 font-medium w-fit">
                            <i data-lucide="star" class="w-2.5 h-2.5 text-amber-500 fill-amber-500"></i> ${wine.tag}
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="text-stone-200 w-5 h-5"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openModal(id) {
            const wine = wines.find(w => w.id === id);
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');

            content.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div style="background-color: ${wine.capsule}" class="w-12 h-12 rounded-full shadow-lg border-4 border-white"></div>
                    <button onclick="closeModal()" class="p-2.5 bg-stone-50 rounded-full text-stone-300 hover:text-stone-900">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-amber-700 block mb-1">${wine.label}</span>
                <h2 class="text-3xl font-serif text-stone-900 mb-4 leading-tight">${wine.name}</h2>
                <div class="space-y-6">
                    <div class="p-5 bg-stone-50 rounded-2xl border border-stone-100 shadow-inner">
                        <p class="text-sm text-stone-700 leading-relaxed italic">"${wine.highlights}"</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="p-4 bg-white border border-stone-100 rounded-2xl text-center">
                            <i data-lucide="award" class="mx-auto text-amber-500 mb-1 w-4 h-4"></i>
                            <span class="block text-[8px] text-stone-400 uppercase font-bold tracking-tighter">Reconocimiento</span>
                            <span class="text-[11px] font-bold text-stone-800">${wine.awards}</span>
                        </div>
                        <div class="p-4 bg-white border border-stone-100 rounded-2xl text-center">
                            <i data-lucide="glass-water" class="mx-auto text-stone-300 mb-1 w-4 h-4"></i>
                            <span class="block text-[8px] text-stone-400 uppercase font-bold tracking-tighter">Maduración</span>
                            <span class="text-[11px] font-bold text-stone-800 leading-none">${wine.details.split('.')[1] || wine.details}</span>
                        </div>
                    </div>
                    <div>
                        <h4 class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                            <i data-lucide="utensils" class="w-3 h-3"></i> Maridaje Sugerido
                        </h4>
                        <p class="text-stone-600 text-xs leading-relaxed">${wine.pairing}</p>
                    </div>
                    <div class="flex flex-col gap-2 pt-2">
                        <button onclick="handleWhatsApp('${wine.name}')" class="w-full bg-stone-900 text-white py-4.5 rounded-2xl font-bold uppercase tracking-widest text-[11px] flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-transform">
                            <i data-lucide="wine" class="w-4 h-4"></i> Consultar Disponibilidad
                        </button>
                        <button onclick="openPDF()" class="w-full bg-white text-stone-400 border border-stone-100 py-3 rounded-xl font-bold uppercase tracking-widest text-[9px] flex items-center justify-center gap-2 hover:bg-stone-50">
                            <i data-lucide="file-text" class="w-3 h-3"></i> Ver Ficha Técnica Completa
                        </button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function handleWhatsApp(wineName = null) {
            const message = wineName 
                ? `Hola! Me interesa el vino *${wineName}*. ¿Tienen disponibilidad?`
                : "Hola! Me gustaría recibir información sobre la selección de vinos de Viña Tuelda.";
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank', 'noopener,noreferrer');
        }

        function openPDF() {
            window.open(pdfUrl, '_blank', 'noopener,noreferrer');
        }

        // Inicializar
        renderWines();
    </script>
</body>
</html>
